name: CI
on: [push, pull_request]
jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32v1-none
      - name: Test contracts
        run: cargo test
      - name: Build wasm
        run: cargo build --target wasm32v1-none --release
